name: windows

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *' # daily

jobs:
  build:
    name: Build py${{ matrix.python-version }} @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # HDF5 file locking hangs to_netcdf() on some CI filesystems
    env:
      HDF5_USE_FILE_LOCKING: "FALSE"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: ['windows-latest']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # does not work with self-hosted testdata
      - name: Checkout test data
        run: |
          git submodule init
          git submodule sync
          git submodule update
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install package and dependencies
        # pygrib (grib extra) has no Windows pip wheel, so it is omitted here.
        run: uv sync --group test
      - name: Print infos
        run: |
          git status
          uv pip list
      # NOTE: WINDOWS tests are deactivated for now!
      # - name: Run tests
      #   run: uv run --no-sync pytest --cache-clear
