name: ubuntu

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *" # daily

jobs:
  build:
    name: Build py${{ matrix.python-version }} @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: ["ubuntu-latest"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # does not work with self-hosted testdata
      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libeccodes: a single shared eccodes used by BOTH pdbufr and pygrib
          # (mirrors the old conda-forge setup). pkg-config lets pygrib's source
          # build locate it. libtiff is needed by pyresample/pykdtree.
          sudo apt-get install -y libtiff-dev libeccodes-dev libeccodes-tools pkg-config
          sudo ln -s /usr/lib/x86_64-linux-gnu/libtiff.so.6 /usr/lib/x86_64-linux-gnu/libtiff.so.5
      - name: Checkout test data
        run: |
          git submodule init
          git submodule sync
          git submodule update
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install package and dependencies
        # Build pygrib from source so it links the system libeccodes instead of
        # bundling its own copy. Loading two different libeccodes into one
        # process corrupts eccodes' global state and deadlocks the BUFR reads.
        run: uv sync --group test --extra grib --no-binary-package pygrib
      - name: Force eccodes binding onto the system library
        # findlibs would otherwise prefer a bundled "eccodeslib" wheel; disabling
        # the PACKAGE source pins the pdbufr/eccodes binding to the same system
        # libeccodes that pygrib was built against.
        run: echo "FINDLIBS_DISABLE_PACKAGE=yes" >> "$GITHUB_ENV"
      - name: Print infos
        run: |
          git status
          uv pip list
      - name: Run tests
        run: uv run --no-sync pytest --cache-clear
      - name: Upload Coverage
        run: uv run --no-sync --with coveralls coveralls --service=github-actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_FLAG_NAME: ${{ matrix.python-version }}
          COVERALLS_PARALLEL: true
      - name: Build sdist and wheel
        run: uv build --out-dir .artifacts/dist
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts-py${{ matrix.python-version }}
          path: .artifacts/*

  coveralls:
    name: Submit Coveralls
    needs: build
    runs-on: ubuntu-latest
    container: python:3-slim
    steps:
      - name: Finished
        run: |
          pip3 install --upgrade coveralls && coveralls --service=github --finish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
